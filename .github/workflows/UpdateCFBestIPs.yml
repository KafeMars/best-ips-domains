name: Update CF-BestIPs
on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

concurrency:
  group: update-cf-bestips
  cancel-in-progress: false

jobs:
  update-ips:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      matrix:
        config:
          - name: CF-BestIPs-A
            url: 'https://www.wetest.vip/api/cf2dns/get_cloudflare_ip?key=o1zrmHAF&type=v4'
          - name: CF-BestIPs-B
            url: 'https://ip.164746.xyz'
            
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch and Process IPs
        run: |
          set -e
          
          retry() {
            local n=0
            local max=3
            local delay=5
            until "$@"; do
              n=$((n+1))
              if [ $n -ge $max ]; then
                exit 1
              fi
              sleep $delay
            done
          }

          RAW_DATA=$(retry curl -s -f --connect-timeout 10 --retry 2 --header "Cache-Control: no-cache" "${{ matrix.config.url }}")
          
          echo "$RAW_DATA" | grep -Eo '\b(25[0-5]|2[0-4][0-9]|[01]?[0-9]{1,2})(\.(25[0-5]|2[0-4][0-9]|[01]?[0-9]{1,2})){3}\b' | sort -u > raw_ips.txt
          
          if [ ! -s raw_ips.txt ]; then
            exit 1
          fi
          
          awk '{print $0":8443"}' raw_ips.txt > "${{ matrix.config.name }}"

      - name: Commit and Merge
        run: |
          set -e
          
          retry() {
            local n=0
            local max=3
            local delay=5
            until "$@"; do
              n=$((n+1))
              if [ $n -ge $max ]; then
                exit 1
              fi
              sleep $delay
            done
          }

          git config user.name 'GitHub Actions'
          git config user.email 'actions@github.com'
          
          BRANCH="update-${{ matrix.config.name }}-$(date +%s)"
          COMMIT_TIME=$(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M')

          git checkout -b "$BRANCH"
          git add "${{ matrix.config.name }}"
          git commit -m "🤖 Update ${{ matrix.config.name }} $COMMIT_TIME" || true
          retry git push origin "$BRANCH"

          git fetch origin main
          git checkout main
          git reset --hard origin/main

          if git merge --no-ff "$BRANCH" -m "Merge $BRANCH into main"; then
            retry git push origin main --force-with-lease
          else
            git merge --abort
          fi

          git fetch --prune
          for branch in $(git branch -r | grep 'origin/update-' | sed 's|origin/||'); do
            git push origin --delete "$branch" || true
          done
